# CI evaluation thresholds — all gates must pass on every push
# Updated 2026-06-06 after bilingual retrain (814 rows, Phase 7)
# Thresholds = measured value − 2pp to allow for reproducibility variance

classifier_macro_f1: 0.97   # measured 0.9980 (12731-row bilingual dataset, 2026-06-06)
en_macro_f1: 0.98            # measured 1.0000 (EN template test set, n=2412)
ar_macro_f1: 0.93            # measured 0.9507 (AR hand-crafted test, n=113; Arabizi=0.83)

classifier_confidence_thresholds:
  report: 0.75
  question: 0.75
  human: 0.65
  spam: 0.90

agent_tool_accuracy: 0.80   # SC-001: ≥ 80% on 15 labelled examples; set in Phase 4
workflow_handled_rate: 0.60 # SC-002: ≥ 60% of turns handled by workflow (no agent LLM call)

rag_hit_at_5: 0.73    # pre-measurement target (spec SC-001 goal: 0.80 − 7pp buffer); update to measured − 2pp after eval run
rag_mrr: 0.60         # pre-measurement target; update to measured − 2pp after eval run
rag_faithfulness: 0.60 # keyword-proxy proxy for faithfulness (SC-002 placeholder: 0.75); update to LLM-judge measured − 2pp in Phase 5
rag_answer_relevancy: 0.0 # reported-not-gated per EVALS.md §5; set to measured value in Phase 5

redteam_pass_rate: 1.0
