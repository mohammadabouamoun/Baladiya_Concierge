server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /widget/ {
        try_files $uri $uri/ /widget/index.html;
    }

    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    add_header X-Content-Type-Options nosniff;
    add_header Cache-Control "public, max-age=3600";
}
