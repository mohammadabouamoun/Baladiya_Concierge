# ============================================================
# Baladiya Concierge — full Compose stack
# Active this phase: db, vault, migrate, api, redis
# All other services are stubbed (no start unless explicitly run)
# ============================================================

networks:
  baladiya:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  vault_data:
  minio_data:

services:

  # ── Database ───────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: baladiya
      POSTGRES_USER: baladiya
      POSTGRES_PASSWORD: baladiya_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - baladiya
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baladiya -d baladiya"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── HashiCorp Vault (dev mode for local/CI) ────────────────
  vault:
    image: hashicorp/vault:1.16
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_TOKEN:-dev-root-token}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    networks:
      - baladiya
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Alembic migrations + seed ──────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
      DATABASE_URL: "postgresql+asyncpg://baladiya:baladiya_dev@db:5432/baladiya"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      PLATFORM_MANAGER_EMAIL: "${PLATFORM_MANAGER_EMAIL:-platform@baladiya.local}"
      PLATFORM_MANAGER_PASSWORD: "${PLATFORM_MANAGER_PASSWORD:-changeme}"
      TENANT_A_NAME: "${TENANT_A_NAME:-Beirut Municipality}"
      TENANT_A_ADMIN_EMAIL: "${TENANT_A_ADMIN_EMAIL:-admin@beirut.gov.lb}"
      TENANT_A_ADMIN_PASSWORD: "${TENANT_A_ADMIN_PASSWORD:-changeme}"
      TENANT_B_NAME: "${TENANT_B_NAME:-Jbeil Municipality}"
      TENANT_B_ADMIN_EMAIL: "${TENANT_B_ADMIN_EMAIL:-admin@jbeil.gov.lb}"
      TENANT_B_ADMIN_PASSWORD: "${TENANT_B_ADMIN_PASSWORD:-changeme}"
    networks:
      - baladiya
    restart: "no"

  # ── API (FastAPI) ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      guardrails:
        condition: service_healthy
      modelserver:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
      DATABASE_URL: "postgresql+asyncpg://baladiya:baladiya_dev@db:5432/baladiya"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MODELSERVER_SERVICE_TOKEN: "${MODELSERVER_SERVICE_TOKEN:-dev-modelserver-token}"
      ENV: development
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - baladiya
    volumes:
      # Live-mount system prompts so edits only need `docker compose restart api`
      # (no image rebuild). Image still bakes them in as the production default.
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - baladiya
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (blob storage) — stubbed until feature 003 ───────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    profiles:
      - blob
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - baladiya

  # ── Model server (onnxruntime/sklearn) ────────────────────
  modelserver:
    build:
      context: .
      dockerfile: modelserver/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_TOKEN: "${MODELSERVER_SERVICE_TOKEN:-dev-modelserver-token}"
      ARTIFACT_PATH: "modelserver/artifacts/classifier.joblib"
      ARTIFACT_AR_PATH: "modelserver/artifacts/classifier_ar.joblib"
    ports:
      - "${MODELSERVER_PORT:-8001}:8001"
    networks:
      - baladiya
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── NeMo Guardrails sidecar ────────────────────────────────
  guardrails:
    build:
      context: .
      dockerfile: guardrails/Dockerfile
    restart: unless-stopped
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
      GUARDRAILS_SERVICE_TOKEN: "${GUARDRAILS_SERVICE_TOKEN:-dev-guardrails-token}"
    ports:
      - "${GUARDRAILS_PORT:-8002}:8002"
    networks:
      - baladiya
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Chat widget (React/Vite static bundle) ────────────────
  widget:
    build:
      context: .
      dockerfile: docker/widget.Dockerfile
    restart: unless-stopped
    ports:
      - "${WIDGET_PORT:-3000}:80"
    networks:
      - baladiya
    healthcheck:
      # 127.0.0.1, not localhost: inside the container localhost resolves to ::1
      # (IPv6) but nginx only listens on IPv4 0.0.0.0:80 → connection refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Chatbot/Admin Streamlit UI (feature 003) ─────────────
  chatbot:
    build:
      context: .
      dockerfile: docker/chatbot.Dockerfile
    restart: unless-stopped
    environment:
      API_BASE_URL: "http://api:8000"
    ports:
      - "${CHATBOT_PORT:-8501}:8501"
    depends_on:
      - api
    networks:
      - baladiya

  # ── Platform Manager Streamlit UI ────────────────────────
  platform_manager:
    build:
      context: .
      dockerfile: docker/platform_manager.Dockerfile
    restart: unless-stopped
    environment:
      API_BASE_URL: "http://api:8000"
    ports:
      - "${PLATFORM_MANAGER_PORT:-8502}:8502"
    depends_on:
      - api
    networks:
      - baladiya

  # ── Host demo site (mock municipality) ───────────────────
  host:
    build:
      context: .
      dockerfile: docker/host.Dockerfile
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    networks:
      - baladiya
    healthcheck:
      # 127.0.0.1, not localhost: see widget healthcheck note above.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
