version: "3.9"

# ============================================================
# Baladiya Concierge — full Compose stack
# Active this phase: db, vault, migrate, api, redis
# All other services are stubbed (no start unless explicitly run)
# ============================================================

networks:
  baladiya:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  vault_data:
  minio_data:

services:

  # ── Database ───────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: baladiya
      POSTGRES_USER: baladiya
      POSTGRES_PASSWORD: baladiya_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - baladiya
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baladiya -d baladiya"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── HashiCorp Vault (dev mode for local/CI) ────────────────
  vault:
    image: hashicorp/vault:1.16
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_TOKEN:-dev-root-token}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    networks:
      - baladiya
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Alembic migrations + seed ──────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
      DATABASE_URL: "postgresql+asyncpg://baladiya:baladiya_dev@db:5432/baladiya"
      PLATFORM_MANAGER_EMAIL: "${PLATFORM_MANAGER_EMAIL:-platform@baladiya.local}"
      PLATFORM_MANAGER_PASSWORD: "${PLATFORM_MANAGER_PASSWORD:-changeme}"
      TENANT_A_NAME: "${TENANT_A_NAME:-Municipality A}"
      TENANT_A_ADMIN_EMAIL: "${TENANT_A_ADMIN_EMAIL:-admin-a@baladiya.local}"
      TENANT_A_ADMIN_PASSWORD: "${TENANT_A_ADMIN_PASSWORD:-changeme}"
      TENANT_B_NAME: "${TENANT_B_NAME:-Municipality B}"
      TENANT_B_ADMIN_EMAIL: "${TENANT_B_ADMIN_EMAIL:-admin-b@baladiya.local}"
      TENANT_B_ADMIN_PASSWORD: "${TENANT_B_ADMIN_PASSWORD:-changeme}"
    networks:
      - baladiya
    restart: "no"

  # ── API (FastAPI) ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
      DATABASE_URL: "postgresql+asyncpg://baladiya:baladiya_dev@db:5432/baladiya"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      ENV: development
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - baladiya
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - baladiya
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (blob storage) — stubbed until feature 003 ───────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    profiles:
      - blob
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - baladiya

  # ── Model server (onnxruntime/sklearn) — stubbed ───────────
  modelserver:
    image: python:3.11-slim
    restart: unless-stopped
    profiles:
      - ml
    command: ["echo", "modelserver stub — build in feature 002"]
    ports:
      - "${MODELSERVER_PORT:-8001}:8001"
    networks:
      - baladiya

  # ── NeMo Guardrails sidecar — stubbed ──────────────────────
  guardrails:
    image: python:3.11-slim
    restart: unless-stopped
    profiles:
      - guardrails
    command: ["echo", "guardrails stub — build in feature 005"]
    ports:
      - "${GUARDRAILS_PORT:-8002}:8002"
    networks:
      - baladiya

  # ── Chat widget (React/Vite) — stubbed ────────────────────
  widget:
    image: node:20-alpine
    restart: unless-stopped
    profiles:
      - frontend
    command: ["echo", "widget stub — build in feature 004"]
    networks:
      - baladiya

  # ── Chatbot/agent service — stubbed ───────────────────────
  chatbot:
    image: python:3.11-slim
    restart: unless-stopped
    profiles:
      - agent
    command: ["echo", "chatbot stub — build in feature 003"]
    networks:
      - baladiya

  # ── Host/reverse proxy (nginx) — stubbed ──────────────────
  host:
    image: nginx:alpine
    restart: unless-stopped
    profiles:
      - proxy
    networks:
      - baladiya
